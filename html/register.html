<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Farm2Door – Register</title>

    <link rel="stylesheet" href="../css/register.css">
    <link rel="icon" type="image/png" href="../asset/Icon.png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: var(--dark-navy);">
    <div class="container">

        <a class="navbar-brand" href="#">
            <img src="../asset/site_logo.png" class="navbar-logo" alt="Farm2Door Logo">
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavId">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="collapsibleNavId">
            <ul class="navbar-nav ms-auto nav-gap">

                <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="about_us.html">About us</a></li>
                <li class="nav-item"><a class="nav-link" href="product.html">Products</a></li>

                <li class="nav-item">
                    <a class="nav-link active" href="register.html">Register</a>
                </li>

                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                <li class="nav-item"><a class="nav-link" href="biography.html">Biography</a></li>

                <li class="nav-item"
                    style="background-color: var(--orange); border-radius: 5px; padding: 2px 10px;">
                    <a class="nav-link"
                       href="cart.html"
                       style="color: var(--dark-navy) !important; font-weight: bold;">
                        <i class="bi bi-cart"></i> Cart
                    </a>
                </li>

            </ul>
        </div>

    </div>
</nav>

<!-- BOOK AUTH CONTAINER -->
<main class="auth-book">

    <!-- LEFT SIDE -->
    <section class="auth-left">
        <img src="../asset/farmer.jpg" alt="farmer guy" class="hero-img" width="455px" height="689px">
        <div class="auth-left-content">
            <h2>Fresh From the Farm</h2>
            <p>Join Farm2Door and get organic produce delivered daily.</p>
        </div>
    </section>

    <!-- RIGHT SIDE -->
    <section class="auth-right">

        <!-- FORM -->
        <form method="POST">

            <h2>Create Account</h2>

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" placeholder="Enter username">
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="Enter email">
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Enter password">
            </div>

            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" placeholder="Confirm password">
            </div>

            <button type="button"
                    class="btn-primary-custom"
                    onclick="showPopup()">
                <i class="bi bi-person-plus"></i> Create Account
            </button>

            <p class="text-center mt-3">
                Already have an account?
                <a href="#" style="color: var(--orange);">Sign in</a>
            </p>

        </form>

    </section>

</main>

<!-- POPUP -->
<div id="signupPopup" class="popup-overlay" role="dialog">
    <div class="popup-box">

        <i class="bi bi-check-circle-fill"></i>

        <h2>Yey! You signed up 🎉</h2>
        <p>Welcome to Farm2Door</p>

        <button type="button"
                onclick="closePopup()"
                class="btn-primary-custom">
            Continue
        </button>

    </div>
</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
function showPopup() {
    document.getElementById("signupPopup").style.display = "flex";
}

function closePopup() {
    document.getElementById("signupPopup").style.display = "none";
}
</script>

</body>
</html>
